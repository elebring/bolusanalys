<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bolusanalys</title>
<style>
body { font-family: system-ui; padding: 16px; max-width: 1100px; margin: auto; }
input { font-size: 16px; padding: 10px; width: 100%; margin: 8px 0; }
table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
.day-row td { background: #f1f1f1; font-weight: bold; font-size: 16px; }
.ok { color: green; font-weight: bold; }
.warn { color: red; font-weight: bold; }
</style>
</head>
<body>

<h1>Bolusanalys</h1>

<p>
Ladda upp Tandem CSV-export. Appen slår ihop bolus inom 40 minuter,
hanterar förlängd bolus och jämför CGM +2h mot mål 6,1 mmol/l.
</p>

<input type="file" id="csvFile" accept=".csv">

<table>
<thead>
<tr>
<th>Tid</th>
<th>Kolh.</th>
<th>Bolus</th>
<th>CGM vid bolus</th>
<th>CGM +2h</th>
<th>BG-förändring</th>
<th>CGM +2h mot mål 6,1</th>
<th>Notering</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<script>
const TARGET = 6.1;
const MERGE_WINDOW_MINUTES = 40;

document.getElementById("csvFile").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  analyzeCsv(await file.text());
});

function parseCsvLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;

  for (let char of line) {
    if (char === '"') inQuotes = !inQuotes;
    else if (char === "," && !inQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result.map(x => x.trim());
}

function normalizeText(value) {
  return String(value || "")
    .toLowerCase()
    .normalize("NFC")
    .trim();
}

function makeHeaderMap(headers) {
  const map = {};
  headers.forEach((h, i) => {
    map[h.trim()] = i;
  });
  return map;
}

function get(cols, map, name) {
  const index = map[name];
  return index === undefined ? "" : cols[index];
}

function num(value) {
  const n = Number(String(value || "").replace(",", "."));
  return isNaN(n) ? 0 : n;
}

function analyzeCsv(text) {
  const lines = text.split(/\r?\n/).filter(Boolean);

  const cgm = [];
  const boluses = [];

  let mode = "";
  let bolusMap = null;

  for (const line of lines) {
    const cols = parseCsvLine(line);

    if (line.startsWith("Enhetstyp,Serienummer,Beskrivning")) {
      mode = "cgm";
      continue;
    }

    if (line.startsWith("Typ,Bolustyp")) {
      mode = "bolus";
      bolusMap = makeHeaderMap(cols);
      continue;
    }

    if (mode === "cgm" && cols[2] === "EGV") {
      cgm.push({
        time: new Date(cols[3]),
        value: num(cols[4])
      });
    }

    if (mode === "bolus" && get(cols, bolusMap, "Typ") === "Bolus") {
      const dosingMethod = get(cols, bolusMap, "Bolus Dosering Metod");
      const isExtended = normalizeText(dosingMethod).includes("förläng");

      const completionTime = new Date(get(cols, bolusMap, "Slutförande Datum Tid"));
      const extendedStartRaw = get(cols, bolusMap, "Fölängd bolus Start Datum Tid");
      const extendedEndRaw = get(cols, bolusMap, "Förlbol Slutförande Datum Tid");

      const extendedStartTime = extendedStartRaw ? new Date(extendedStartRaw) : null;
      const extendedEndTime = extendedEndRaw ? new Date(extendedEndRaw) : null;

      const displayTime = isExtended && extendedStartTime
        ? extendedStartTime
        : completionTime;

      const endTime = isExtended && extendedEndTime
        ? extendedEndTime
        : completionTime;

      const carbs = num(get(cols, bolusMap, "Kolhydratsstorlek"));
      const insulin = num(get(cols, bolusMap, "Insulin Doserat"));
      const bg = num(get(cols, bolusMap, "BG (mmol/L)"));

      if (carbs > 0 && insulin > 0) {
        boluses.push({
          time: displayTime,
          endTime,
          bg,
          insulin,
          carbs,
          isExtended
        });
      }
    }
  }

  boluses.sort((a, b) => a.time - b.time);
  const groupedBoluses = mergeBoluses(boluses);

  const results = groupedBoluses.map(g => {
    const afterBaseTime = g.hasExtended ? g.latestEndTime : g.lastBolusTime;
    const afterTime = new Date(afterBaseTime.getTime() + 2 * 60 * 60 * 1000);

    const cgmAtStart = findClosestCgm(cgm, g.firstBolusTime);
    const cgmAfter = findClosestCgm(cgm, afterTime);

    const bgStart = cgmAtStart ? cgmAtStart.value : g.bg;
    const bgChange = cgmAfter ? cgmAfter.value - bgStart : null;
    const targetDiff = cgmAfter ? cgmAfter.value - TARGET : null;

    return { ...g, bgStart, cgmAfter, bgChange, targetDiff };
  });

  render(results);
}

function mergeBoluses(boluses) {
  const groups = [];

  for (const b of boluses) {
    const lastGroup = groups[groups.length - 1];

    if (
      lastGroup &&
      (b.time - lastGroup.lastBolusTime) <= MERGE_WINDOW_MINUTES * 60 * 1000
    ) {
      lastGroup.carbs += b.carbs;
      lastGroup.insulin += b.insulin;
      lastGroup.lastBolusTime = b.time;
      lastGroup.latestEndTime = b.endTime > lastGroup.latestEndTime
        ? b.endTime
        : lastGroup.latestEndTime;
      lastGroup.hasMultiple = true;
      lastGroup.hasExtended = lastGroup.hasExtended || b.isExtended;
    } else {
      groups.push({
        firstBolusTime: b.time,
        lastBolusTime: b.time,
        latestEndTime: b.endTime,
        bg: b.bg,
        carbs: b.carbs,
        insulin: b.insulin,
        hasMultiple: false,
        hasExtended: b.isExtended
      });
    }
  }

  return groups;
}

function findClosestCgm(cgm, targetTime) {
  let best = null;
  let bestDiff = Infinity;

  for (const point of cgm) {
    const diff = Math.abs(point.time - targetTime);
    if (diff < bestDiff) {
      best = point;
      bestDiff = diff;
    }
  }

  return bestDiff > 20 * 60 * 1000 ? null : best;
}

function formatDate(date) {
  return date.toLocaleDateString("sv-SE", {
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric"
  });
}

function formatTime(date) {
  return date.toLocaleTimeString("sv-SE", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

function formatDiff(value) {
  if (value === null) return "saknas";
  return `${value > 0 ? "+" : ""}${value.toFixed(1)}`;
}

function getNote(r) {
  const notes = [];
  if (r.hasMultiple) notes.push("Multipla bolus");
  if (r.hasExtended) notes.push("Förlängd bolus");
  return notes.join(" + ");
}

function render(results) {
  let currentDay = "";

  if (!results.length) {
    rows.innerHTML = `<tr><td colspan="8">Inga måltidsbolus hittades.</td></tr>`;
    return;
  }

  rows.innerHTML = results.map(r => {
    const day = r.firstBolusTime.toDateString();
    let dayHeader = "";

    if (day !== currentDay) {
      currentDay = day;
      dayHeader = `
        <tr class="day-row">
          <td colspan="8">${formatDate(r.firstBolusTime)}</td>
        </tr>
      `;
    }

    const after = r.cgmAfter ? r.cgmAfter.value.toFixed(1) : "saknas";

    const targetClass =
      r.targetDiff === null ? "" :
      Math.abs(r.targetDiff) > 1.5 ? "warn" : "ok";

    return `
      ${dayHeader}
      <tr>
        <td>${formatTime(r.firstBolusTime)}</td>
        <td>${r.carbs.toFixed(0)} g</td>
        <td>${r.insulin.toFixed(2)} E</td>
        <td>${r.bgStart.toFixed(1)}</td>
        <td>${after}</td>
        <td>${formatDiff(r.bgChange)}</td>
        <td class="${targetClass}">${formatDiff(r.targetDiff)}</td>
        <td>${getNote(r)}</td>
      </tr>
    `;
  }).join("");
}
</script>

</body>
</html>
