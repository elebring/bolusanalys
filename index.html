<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bolusanalys</title>
<style>
body { font-family: system-ui; padding: 16px; max-width: 1000px; margin: auto; }
input { font-size: 16px; padding: 10px; width: 100%; margin: 8px 0; }
table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
.day-row td {
  background: #f1f1f1;
  font-weight: bold;
  font-size: 16px;
  padding-top: 14px;
}
.ok { color: green; font-weight: bold; }
.warn { color: red; font-weight: bold; }
</style>
</head>
<body>

<h1>Bolusanalys</h1>

<p>Ladda upp Tandem CSV-export. Appen grupperar måltidsbolus per dag och jämför CGM cirka 2 timmar efter bolus mot målvärdet 6,1 mmol/l.</p>

<input type="file" id="csvFile" accept=".csv">

<table>
<thead>
<tr>
<th>Tid</th>
<th>Kolh.</th>
<th>Bolus</th>
<th>BG vid bolus</th>
<th>CGM +2h</th>
<th>BG-förändring</th>
<th>CGM +2h mot mål 6,1</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<script>
const TARGET = 6.1;

document.getElementById("csvFile").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;

  const text = await file.text();
  analyzeCsv(text);
});

function parseCsvLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;

  for (let char of line) {
    if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === "," && !inQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result.map(x => x.trim());
}

function analyzeCsv(text) {
  const lines = text.split(/\r?\n/).filter(Boolean);

  const cgm = [];
  const boluses = [];

  let mode = "";

  for (const line of lines) {
    const cols = parseCsvLine(line);

    if (line.startsWith("Enhetstyp,Serienummer,Beskrivning")) {
      mode = "cgm";
      continue;
    }

    if (line.startsWith("Typ,Bolustyp")) {
      mode = "bolus";
      continue;
    }

    if (mode === "cgm" && cols[2] === "EGV") {
      cgm.push({
        time: new Date(cols[3]),
        value: Number(cols[4])
      });
    }

    if (mode === "bolus" && cols[0] === "Bolus") {
      const bolusType = cols[1];
      const carbs = Number(cols[16] || 0);
      const mealBolus = Number(cols[7] || 0);

      if (
        carbs > 0 &&
        mealBolus > 0 &&
        (bolusType.includes("Måltid") || bolusType.includes("Mat"))
      ) {
        boluses.push({
          time: new Date(cols[5]),
          bg: Number(cols[3]),
          insulin: Number(cols[6]),
          mealBolus,
          carbs
        });
      }
    }
  }

  const results = boluses.map(b => {
    const afterTime = new Date(b.time.getTime() + 2 * 60 * 60 * 1000);
    const cgmAfter = findClosestCgm(cgm, afterTime);
    const bgChange = cgmAfter ? cgmAfter.value - b.bg : null;
    const targetDiff = cgmAfter ? cgmAfter.value - TARGET : null;

    return { ...b, cgmAfter, bgChange, targetDiff };
  });

  results.sort((a, b) => a.time - b.time);
  render(results);
}

function findClosestCgm(cgm, targetTime) {
  let best = null;
  let bestDiff = Infinity;

  for (const point of cgm) {
    const diff = Math.abs(point.time - targetTime);

    if (diff < bestDiff) {
      best = point;
      bestDiff = diff;
    }
  }

  if (bestDiff > 20 * 60 * 1000) return null;

  return best;
}

function formatDate(date) {
  return date.toLocaleDateString("sv-SE", {
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric"
  });
}

function formatTime(date) {
  return date.toLocaleTimeString("sv-SE", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

function formatDiff(value) {
  if (value === null) return "saknas";
  return `${value > 0 ? "+" : ""}${value.toFixed(1)}`;
}

function render(results) {
  let currentDay = "";

  rows.innerHTML = results.map(r => {
    const day = r.time.toDateString();
    let dayHeader = "";

    if (day !== currentDay) {
      currentDay = day;
      dayHeader = `
        <tr class="day-row">
          <td colspan="7">${formatDate(r.time)}</td>
        </tr>
      `;
    }

    const after = r.cgmAfter ? r.cgmAfter.value.toFixed(1) : "saknas";
    const targetClass =
      r.targetDiff === null ? "" :
      Math.abs(r.targetDiff) > 1.5 ? "warn" : "ok";

    return `
      ${dayHeader}
      <tr>
        <td>${formatTime(r.time)}</td>
        <td>${r.carbs} g</td>
        <td>${r.insulin.toFixed(2)} E</td>
        <td>${r.bg.toFixed(1)}</td>
        <td>${after}</td>
        <td>${formatDiff(r.bgChange)}</td>
        <td class="${targetClass}">${formatDiff(r.targetDiff)}</td>
      </tr>
    `;
  }).join("");
}
</script>

</body>
</html>
